<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Session Details · Brown Bags Tracker</title>
<style>
  :root {
    --bg: #f6f5f2;
    --surface: #ffffff;
    --border: #e3e0da;
    --text: #2b2926;
    --text-muted: #7a746b;
    --accent: #b5651d;
    --accent-soft: #f1e4d6;
    --badge-new: #3f7d58;
    --badge-new-bg: #e4f1e9;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
    background: var(--bg);
    color: var(--text);
  }
  main {
    max-width: 720px;
    margin: 0 auto;
    padding: 32px 24px 60px;
  }
  .back-link {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    color: var(--text-muted);
    text-decoration: none;
    font-size: 14px;
    margin-bottom: 24px;
  }
  .back-link:hover { color: var(--accent); }
  .detail-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 28px 28px 32px;
  }
  .detail-header {
    display: flex;
    justify-content: space-between;
    gap: 20px;
    align-items: flex-start;
  }
  .detail-title {
    font-size: 24px;
    font-weight: 700;
    margin: 0 0 6px;
    line-height: 1.25;
  }
  .topic-pill {
    display: inline-block;
    background: var(--accent-soft);
    color: var(--accent);
    font-size: 12px;
    font-weight: 600;
    padding: 3px 10px;
    border-radius: 999px;
  }
  .date-block {
    text-align: center;
    background: var(--accent-soft);
    color: var(--accent);
    border-radius: 12px;
    padding: 10px 14px;
    min-width: 76px;
    flex-shrink: 0;
  }
  .date-day { font-size: 26px; font-weight: 700; line-height: 1; }
  .date-month { font-size: 12px; text-transform: uppercase; margin-top: 2px; }

  .meta-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
    gap: 16px 24px;
    margin: 24px 0;
    padding: 20px 0;
    border-top: 1px solid var(--border);
    border-bottom: 1px solid var(--border);
  }
  .meta-item .meta-label {
    font-size: 12px;
    text-transform: uppercase;
    letter-spacing: 0.03em;
    color: var(--text-muted);
    margin-bottom: 4px;
  }
  .meta-item .meta-value { font-size: 15px; }

  .section-label {
    font-size: 12px;
    text-transform: uppercase;
    letter-spacing: 0.03em;
    color: var(--text-muted);
    margin: 0 0 6px;
  }
  .description { font-size: 15px; line-height: 1.6; margin: 0 0 24px; }

  .presenter-row {
    display: flex;
    align-items: center;
    gap: 14px;
  }
  .avatar {
    width: 46px;
    height: 46px;
    border-radius: 50%;
    background: var(--accent);
    color: #fff;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 18px;
    font-weight: 600;
    flex-shrink: 0;
  }
  .presenter-name { font-size: 16px; font-weight: 600; }
  .presenter-bg { font-size: 13px; color: var(--text-muted); }

  .badge {
    display: inline-block;
    font-size: 12px;
    padding: 3px 10px;
    border-radius: 999px;
    white-space: nowrap;
    margin-top: 8px;
  }
  .badge-returning { background: var(--badge-new-bg); color: var(--badge-new); }
  .badge-first { background: var(--accent-soft); color: var(--accent); }

  .not-found {
    text-align: center;
    color: var(--text-muted);
    padding: 60px 20px;
  }

  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #1c1a17;
      --surface: #26231f;
      --border: #3a352e;
      --text: #ece7de;
      --text-muted: #a39a8c;
      --accent: #d98a4a;
      --accent-soft: #3a2c1e;
      --badge-new: #7fd9a0;
      --badge-new-bg: #1f3327;
    }
  }
</style>
</head>
<body>

<main>
  <a class="back-link" href="index.html">← Back to all sessions</a>
  <div id="content"></div>
</main>

<script src="data.js"></script>
<script>
  function getParam(name) {
    return new URLSearchParams(window.location.search).get(name);
  }

  function formatDateParts(dateStr) {
    const d = new Date(dateStr + "T00:00:00");
    return {
      day: d.getDate(),
      month: d.toLocaleString("en-US", { month: "short" }).toUpperCase(),
      full: d.toLocaleDateString("en-US", { weekday: "long", month: "long", day: "numeric", year: "numeric" })
    };
  }

  function initials(name) {
    return name.split(/\s+/).map(w => w[0]).slice(0, 2).join("").toUpperCase();
  }

  function render() {
    const content = document.getElementById("content");
    const id = getParam("id");
    const session = (window.SESSIONS || []).find(s => s.id === id);

    if (!session) {
      content.innerHTML = '<div class="not-found">Session not found. <a href="index.html">Return to the dashboard.</a></div>';
      return;
    }

    document.title = session.title + " · Brown Bags Tracker";
    const { day, month, full } = formatDateParts(session.date);
    const badge = session.returning
      ? '<span class="badge badge-returning">Returning presenter</span>'
      : '<span class="badge badge-first">First time presenting</span>';

    content.innerHTML = `
      <div class="detail-card">
        <div class="detail-header">
          <div>
            <span class="topic-pill">${session.topic}</span>
            <h1 class="detail-title" style="margin-top:10px;">${session.title}</h1>
          </div>
          <div class="date-block">
            <div class="date-day">${day}</div>
            <div class="date-month">${month}</div>
          </div>
        </div>

        <div class="meta-grid">
          <div class="meta-item">
            <div class="meta-label">Date</div>
            <div class="meta-value">${full}</div>
          </div>
          <div class="meta-item">
            <div class="meta-label">Time</div>
            <div class="meta-value">${session.time}</div>
          </div>
          <div class="meta-item">
            <div class="meta-label">Location</div>
            <div class="meta-value">${session.location}</div>
          </div>
        </div>

        <p class="section-label">About this session</p>
        <p class="description">${session.description}</p>

        <p class="section-label">Presenter</p>
        <div class="presenter-row">
          <div class="avatar">${initials(session.presenter)}</div>
          <div>
            <div class="presenter-name">${session.presenter}</div>
            <div class="presenter-bg">${session.background}</div>
          </div>
        </div>
        ${badge}
      </div>
    `;
  }

  render();
</script>

</body>
</html>
